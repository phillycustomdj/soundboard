<!DOCTYPE html>
<html>
<head>
    <title>Soundboard</title>
    <script>
        // Function to stop all sounds
        function stopAll() {
            var sounds = document.getElementsByTagName('audio');
            for (var i = 0; i < sounds.length; i++) {
                sounds[i].pause();
                sounds[i].currentTime = 0;
            }
        }

        // Other functions for playing sounds
        function playSound(soundFile) {
            var sound = new Audio(soundFile);
            sound.play();
        }
    </script>
</head>
<body>
    <h1>Welcome to the Soundboard</h1>
    <button onclick="playSound('sound1.mp3')">Play Sound 1</button>
    <button onclick="playSound('sound2.mp3')">Play Sound 2</button>
    <button onclick="stopAll()">Stop All Sounds</button>
</body>
</html>
