<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Virtual Menu Soundboard</title>
    <script>
        let audioFiles = [];
        let isPlaying = false;

        function stopAll() {
            audioFiles.forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
            isPlaying = false;
        }

        function playAudio(file) {
            stopAll();
            const audio = new Audio(file);
            audioFiles.push(audio);
            audio.play();
            isPlaying = true;
        }
    </script>
</head>
<body>
    <h1>Welcome to the Virtual Menu Soundboard</h1>
    <button onclick="playAudio('sound1.mp3')">Sound 1</button>
    <button onclick="playAudio('sound2.mp3')">Sound 2</button>
    <button onclick="stopAll()">Stop All</button>
</body>
</html>
