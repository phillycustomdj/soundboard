<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Mennu Soundboard</title>
    <style>
        body {
            background-color: #121212;
            color: #FFA500;
            font-family: Arial, sans-serif;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }
        button {
            padding: 20px;
            font-size: 20px;
            background-color: #333;
            color: #FFA500;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #444;
        }
        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Virtual Mennu Soundboard</h1>
    <div class="grid-container">
        <button onclick="new Audio('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/Hoomoose.mp3').play()">Hoomoose</button>
        <button onclick="new Audio('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/Beer Nuts.mp3').play()">Beer Nuts</button>
        <button onclick="new Audio('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/Hell.mp3').play()">Hell</button>
        <button onclick="new Audio('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/Math.mp3').play()">Math</button>
        <button onclick="new Audio('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/The Regiment.mp3').play()">The Regiment</button>
        <button onclick="new Audio('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/Foghat.mp3').play()">Foghat</button>
    </div>
    <footer>MENNU.COM LEGACY • 2026</footer>
</body>
</html>
