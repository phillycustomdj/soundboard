<!DOCTYPE html>
<html>
<head>
    <title>Soundboard</title>
</head>
<body>
    <h1>Soundboard</h1>
    <button onclick="playSound('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/sound1.mp3')">Sound 1</button>
    <button onclick="playSound('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/sound2.mp3')">Sound 2</button>
    <button onclick="playSound('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/sound3.mp3')">Sound 3</button>

    <audio id="audioPlayer" controls></audio>

    <script>
        function playSound(url) {
            const audioPlayer = document.getElementById('audioPlayer');
            audioPlayer.src = url;
            audioPlayer.play();
        }
    </script>
</body>
</html>
