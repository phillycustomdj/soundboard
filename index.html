<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Menu Soundboard</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 50%;
        }
        .button {
            background-color: #cc6600;
            border: none;
            color: white;
            padding: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .button:active {
            transform: scale(0.95);
        }
        .pulse {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        footer {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Virtual Menu Soundboard</h1>
    <div class="grid">
        <button class="button" id="hoomoose" onclick="playSound('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/hoomoose.mp3')">Hoomoose</button>
        <button class="button" id="beernuts" onclick="playSound('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/beernuts.mp3')">Beer Nuts</button>
        <button class="button" id="hell" onclick="playSound('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/hell.mp3')">Hell</button>
        <button class="button" id="math" onclick="playSound('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/math.mp3')">Math</button>
        <button class="button" id="regiment" onclick="playSound('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/regiment.mp3')">The Regiment</button>
        <button class="button" id="foghat" onclick="playSound('https://raw.githubusercontent.com/phillycustomdj/soundboard/main/audio/foghat.mp3')">Foghat</button>
    </div>
    <footer>
        <p>&copy; 2026 Virtual Menu Soundboard</p>
    </footer>
    <script>
        function playSound(url) {
            const audio = new Audio(url);
            audio.play();
        }
    </script>
</body>
</html>
